<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Song — NoteByNote</title>
  <link rel="stylesheet" href="/pages/css/global.css" />
  <link rel="stylesheet" href="/pages/css/song.css" />
</head>
<body>

  <!-- ── NAVBAR (Dhivya owns this) ── -->
  <nav class="navbar">
    <a href="/pages/index.html" class="navbar-logo">
      <div class="navbar-logo-dot"></div>
      NoteByNote
    </a>
    <ul class="navbar-links">
      <li><a href="/pages/index.html"  class="nav-link" data-page="home">  <span class="nav-icon">♩</span><span class="nav-label">Home</span></a></li>
      <li><a href="/pages/songs.html"  class="nav-link" data-page="songs"> <span class="nav-icon">♫</span><span class="nav-label">Songs</span></a></li>
      <li><a href="/pages/chords.html" class="nav-link" data-page="chords"><span class="nav-icon">◈</span><span class="nav-label">Chord Dictionary</span></a></li>
      <li><a href="/pages/about.html"  class="nav-link" data-page="about"> <span class="nav-icon">◎</span><span class="nav-label">About</span></a></li>
    </ul>
  </nav>

  <!-- ── SONG HEADER (Catherine owns everything below) ── -->
  <div class="song-page-header">
    <div>
      <a href="/pages/songs" class="song-back">← back to search</a>
      <h1 class="song-page-title" id="sp-title">Loading…</h1>
      <p class="song-page-artist" id="sp-artist"></p>
    </div>
    <div style="display:flex;flex-direction:column;align-items:flex-end;gap:6px;">
      <span class="song-key-badge" id="sp-key"></span>
      <span class="song-hint">tap any chord to see fingering</span>
    </div>
  </div>

  <!-- ── TWO-COLUMN LAYOUT ── -->
  <div class="song-layout">

    <!-- Lyrics panel -->
    <div class="lyrics-panel" id="sp-lyrics-panel">
      <p class="panel-eyebrow">Lyrics &amp; Chords</p>
      <div id="sp-lyrics"></div>
    </div>

    <!-- Side panel -->
    <div class="side-panel">

      <!-- YouTube embed slot (Pranathi fills this out) -->
      <div class="yt-wrapper" id="sp-yt-wrapper">
        <!-- filled by song.js -->
      </div>

      <!-- Chord viewer -->
      <div class="chord-card">
        <div class="chord-card-header">
          CHORD VIEWER
          <span class="chord-card-hint" id="sp-chord-hint">click a chord above</span>
        </div>
        <div class="chord-display-area" id="sp-chord-display">
          <div class="chord-empty-state">
            <div class="chord-empty-icon">♩</div>
            <p class="chord-empty-text">Tap any chord in the lyrics to see its fingering</p>
          </div>
        </div>
        <div class="chord-pills" id="sp-chord-pills"></div>
      </div>

    </div>
  </div>

  <script src="/pages/js/data.js"></script>
  <script src="/pages/js/chordDiagram.js"></script>
  <script src="/pages/js/navbar.js"></script>
  <script src="/pages/js/song.js"></script>
</body>
</html>
